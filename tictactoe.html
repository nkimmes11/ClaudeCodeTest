<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #1a1a2e; color: #eee;
    flex-direction: column; gap: 24px;
  }
  h1 { font-size: 2rem; letter-spacing: 2px; }
  #status {
    font-size: 1.25rem; min-height: 1.5em;
    transition: color .2s;
  }
  #board {
    display: grid; grid-template-columns: repeat(3, 120px); grid-template-rows: repeat(3, 120px);
    gap: 6px;
  }
  .cell {
    background: #16213e; border: none; border-radius: 8px;
    font-size: 3rem; color: #eee; cursor: pointer;
    transition: background .15s, transform .1s;
  }
  .cell:hover:not(.taken) { background: #1a1a40; transform: scale(1.04); }
  .cell.x { color: #e94560; }
  .cell.o { color: #0f3460; }
  .cell.win { background: #e9456022; }
  #restart {
    padding: 10px 28px; font-size: 1rem; border: 2px solid #e94560;
    background: transparent; color: #e94560; border-radius: 6px;
    cursor: pointer; letter-spacing: 1px; transition: background .2s, color .2s;
  }
  #restart:hover { background: #e94560; color: #fff; }
</style>
</head>
<body>
<h1>Tic Tac Toe</h1>
<div id="status">X's turn</div>
<div id="board"></div>
<button id="restart">New Game</button>
<script>
const board = document.getElementById('board');
const status = document.getElementById('status');
const restartBtn = document.getElementById('restart');
const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
let cells, turn, over;

function init() {
  board.innerHTML = '';
  cells = Array(9).fill('');
  turn = 'X';
  over = false;
  status.textContent = "X's turn";
  for (let i = 0; i < 9; i++) {
    const btn = document.createElement('button');
    btn.className = 'cell';
    btn.dataset.i = i;
    btn.addEventListener('click', play);
    board.appendChild(btn);
  }
}

function play(e) {
  const i = +e.target.dataset.i;
  if (over || cells[i]) return;
  cells[i] = turn;
  const btn = e.target;
  btn.textContent = turn;
  btn.classList.add(turn.toLowerCase(), 'taken');

  const winLine = wins.find(w => w.every(j => cells[j] === turn));
  if (winLine) {
    over = true;
    status.textContent = turn + ' wins!';
    winLine.forEach(j => board.children[j].classList.add('win'));
    return;
  }
  if (cells.every(c => c)) {
    over = true;
    status.textContent = "It's a draw!";
    return;
  }
  turn = turn === 'X' ? 'O' : 'X';
  status.textContent = turn + "'s turn";
}

restartBtn.addEventListener('click', init);
init();
</script>
</body>
</html>
